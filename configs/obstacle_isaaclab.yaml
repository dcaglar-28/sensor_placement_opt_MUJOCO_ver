# Rectangular-prism + six fixed mount points (obstacle / t_det pipeline).
#
# CMA-ES: six vector blocks (2+2+2 lidar/camera/radar budget) with `fixed_mount_order: true` and
# `fixed_sensor_geometry: true` (default): only **type + on/off** per mount (2 floats each → 12-D search).
# x/y/z/yaw/pitch/range/fov are taken from `default_sensor_pose` (forward-facing, safe boresight by default).
# Set `fixed_sensor_geometry: false` to use the full 10-float continuous pose per mount again.
#
# Bridge (Isaac Sim / Lab):
#   --bridge-mode obstacle --obstacle-layout prism_path --enable-prism-prototype \
#   --prism-path-root /World/bridge_prism_path
# This spawns a prototype prism with six child mount Xforms; obstacles sample in a path-aligned band.
# The HTTP bridge is still the split-process path from the optimizer (see repo README / Colab notebook).
#
# Mount point semantics (body +X forward, +Y left, +Z up): `sensor_opt/inner_loop/prism_path_scene.py`

experiment:
  name: "obstacle_isaaclab_prism_run"
  seed: 42

search:
  type: cma

fixed_mount_order: true
fixed_sensor_geometry: true

# Applied when `fixed_sensor_geometry: true` (merges: all → per-type → per_slot[slot name]).
default_sensor_pose:
  all:
    x_offset: 0.0
    y_offset: 0.0
    z_offset: 0.2
    yaw_deg: 0.0
    pitch_deg: 0.0
    range_fraction: 1.0
    hfov_fraction: 1.0
  camera:
    yaw_deg: 0.0
    pitch_deg: 0.0

sensor_budget:
  lidar:
    max_count: 2
  camera:
    max_count: 2
  radar:
    max_count: 2

sensor_models:
  lidar:
    isaac:
      prim_path: ""
      mount_prim_paths:
        prism_front_face_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_l"
        prism_front_face_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_r"
        prism_top_edge_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_l"
        prism_top_edge_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_r"
        prism_left_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_left_edge"
        prism_right_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_right_edge"
    model_name: "Velodyne VLP-16"
    cost_usd: 4000
    range_m: 100.0
    horizontal_fov_deg: 360.0
    vertical_fov_deg: 30.0
    beams: 16
    points_per_second: 300000
    mass_kg: 0.83
    blind_spot_reduction_factor: 0.85
    compute_tops: 8.0
    memory_gb: 1.2
    latency_ms: 20.0
  camera:
    isaac:
      prim_path: ""
      mount_prim_paths:
        prism_front_face_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_l"
        prism_front_face_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_r"
        prism_top_edge_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_l"
        prism_top_edge_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_r"
        prism_left_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_left_edge"
        prism_right_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_right_edge"
    model_name: "Intel RealSense D435i"
    cost_usd: 200
    range_m: 10.0
    horizontal_fov_deg: 87.0
    vertical_fov_deg: 58.0
    depth_accuracy_pct: 2.0
    mass_kg: 0.07
    blind_spot_reduction_factor: 0.45
    compute_tops: 2.0
    memory_gb: 0.4
    latency_ms: 8.0
  radar:
    isaac:
      prim_path: ""
      mount_prim_paths:
        prism_front_face_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_l"
        prism_front_face_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_front_face_r"
        prism_top_edge_l: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_l"
        prism_top_edge_r: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_top_edge_r"
        prism_left_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_left_edge"
        prism_right_edge: "/World/bridge_prism_path/env_{env_idx}/PrismBody/mounts/prism_right_edge"
    model_name: "TI AWR1843BOOST"
    cost_usd: 650
    range_m: 30.0
    horizontal_fov_deg: 120.0
    vertical_fov_deg: 30.0
    mass_kg: 0.05
    blind_spot_reduction_factor: 0.60
    compute_tops: 1.0
    memory_gb: 0.2
    latency_ms: 6.0

mounting_slots:
  - prism_front_face_l
  - prism_front_face_r
  - prism_top_edge_l
  - prism_top_edge_r
  - prism_left_edge
  - prism_right_edge

cma:
  sigma0: 0.3
  population_size: 20
  max_generations: 100
  tolx: 1e-4
  tolfun: 1e-5

loss:
  mode: obstacle_latency
  alpha: 1.0
  beta: 100.0
  gamma: 0.0
  max_cost_usd: 10000.0
  t_det_max_s: 10.0

inner_loop:
  mode: "isaac_sim"
  n_episodes: 20
  max_steps_per_episode: 500
  isaac_sim:
    sensor_noise_std: 0.0

hardware:
  name: "colab_t4_like"
  gpu_cores: 2560
  unified_memory_gb: 16.0
  memory_bandwidth_gbps: 320.0
  compute_limit_tops: 1e9
  memory_limit_gb: 1e9
  latency_budget_ms: 1e9

multi_fidelity:
  enabled: false

logging:
  csv: true
  mlflow: true
  mlflow_tracking_uri: "mlruns"
  log_every_n_generations: 1
  results_dir: "results"
