# Isaac Lab + obstacle-corridor style evaluation (used with `scripts/isaaclab_sensor_bridge.py --bridge-mode obstacle`).
# Notes:
# - On Colab, set `BRIDGE_MODE=obstacle` for the bridge and point the optimizer at this file either explicitly
#   (`CONFIG_PATH=configs/obstacle_isaaclab.yaml`) or via the notebook default that maps `BRIDGE_MODE` → config.
# - The Colab notebook `notebooks/sensor_opt_isaaclab_colab.ipynb` may override `inner_loop.n_episodes` and
#   `max_steps_per_episode` in-memory for quick smoke tests; keep them aligned with the bridge’s `--max-steps`
#   / `--sim-dt` when you run full experiments.
# - The bridge spawns 3-5 static cuboids per reset and reports p95(t_det) + contact-based collision rate.
# - The optimization objective (when `loss.mode: obstacle_latency`) is:
#     Loss = alpha * p95(t_det) + beta * collision_rate
#   with p95(t_det) normalized by `t_det_max_s` to keep terms comparable.
#
# For a full Isaac Lab task, you may still need to add sensors/obstacles in your `InteractiveSceneCfg`
# in the task repo; this repo provides a *bridge-side* best-effort USD spawner for rapid prototyping.

experiment:
  name: "obstacle_isaaclab_run"
  seed: 42

search:
  type: cma

sensor_budget:
  lidar:
    max_count: 2
  camera:
    max_count: 2
  radar:
    max_count: 1

sensor_models:
  lidar:
    isaac:
      # USD path to the sensor Xform (required for the bridge to move the prim). Use `{env_idx}` in vectorized envs, e.g.:
      #   prim_path: "/World/envs/env_{env_idx}/Robot/your_lidar"
      # Multiple lidars: use `prim_paths: [".../lidar0", ".../lidar1"]` (order matches active lidars) or
      # `mount_prim_paths: { front: "...", top: "..." }` matching `SingleSensorConfig.slot`.
      prim_path: ""
    model_name: "Velodyne VLP-16"
    cost_usd: 4000
    range_m: 100.0
    horizontal_fov_deg: 360.0
    vertical_fov_deg: 30.0
    beams: 16
    points_per_second: 300000
    mass_kg: 0.83
    blind_spot_reduction_factor: 0.85
    compute_tops: 8.0
    memory_gb: 1.2
    latency_ms: 20.0
  camera:
    isaac:
      # Same as lidar, or set env `ISAAC_CAMERA_PRIM` in Colab if you prefer not to commit paths.
      prim_path: ""
    model_name: "Intel RealSense D435i"
    cost_usd: 200
    range_m: 10.0
    horizontal_fov_deg: 87.0
    vertical_fov_deg: 58.0
    depth_accuracy_pct: 2.0
    mass_kg: 0.07
    blind_spot_reduction_factor: 0.45
    compute_tops: 2.0
    memory_gb: 0.4
    latency_ms: 8.0
  radar:
    model_name: "TI AWR1843BOOST"
    cost_usd: 650
    range_m: 30.0
    horizontal_fov_deg: 120.0
    vertical_fov_deg: 30.0
    mass_kg: 0.05
    blind_spot_reduction_factor: 0.60
    compute_tops: 1.0
    memory_gb: 0.2
    latency_ms: 6.0

mounting_slots:
  - front
  - rear
  - left
  - right
  - top
  - front-left
  - front-right
  - rear-left
  - rear-right

cma:
  sigma0: 0.3
  population_size: 20
  max_generations: 100
  tolx: 1e-4
  tofun: 1e-5

loss:
  mode: obstacle_latency
  # Match the user's requested form with normalized p95 term:
  #   Loss = 1.0 * (p95(t_det) / t_det_max_s) + 100.0 * collision_rate
  alpha: 1.0
  beta: 100.0
  gamma: 0.0
  max_cost_usd: 10000.0
  # If `max_steps=500` and `sim dt≈0.02` (bridge default), episode horizon is ~10s
  t_det_max_s: 10.0

inner_loop:
  mode: "isaac_sim" # bridge-backed IsaacSimEvaluator
  n_episodes: 20
  max_steps_per_episode: 500
  isaac_sim: {}

hardware:
  name: "not_used_in_obstacle_latency"
  compute_limit_tops: 1e9
  memory_limit_gb: 1e9
  latency_budget_ms: 1e9

multi_fidelity:
  enabled: false

logging:
  csv: true
  mlflow: true
  mlflow_tracking_uri: "mlruns"
  log_every_n_generations: 1
  results_dir: "results"
